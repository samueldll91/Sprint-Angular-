<div class="login-container">

    <!-- Lado esquerdo -->
    <div class="image-section">

        <!-- Depois você vai puxar da API -->
        <img
            src="/img/ranger.png"
            alt="Veículo"
            class="vehicle-image">

    </div>

    <!-- Lado direito -->
    <div class="form-section">

        <img
            src="/img/ford.png"
            alt="Logo Ford"
            class="logo">

        <h2 class="titulo">Boas-vindas</h2>

        <form (ngSubmit)="fazerLogin()">

            <div class="form-group">

                <input
                    type="text"
                    class="form-control"
                    placeholder="Digite seu usuário"
                    [(ngModel)]="nome"
                    name="nome">

            </div>

            <div class="form-group">

                <input
                    type="password"
                    class="form-control"
                    placeholder="Digite sua senha"
                    [(ngModel)]="senha"
                    name="senha">

            </div>

            <div class="form-check">

                <input
                    type="checkbox"
                    id="lembrar">

                <label for="lembrar">
                    Logar automaticamente
                </label>

            </div>

            <button
                type="submit"
                class="btn-login">

                Entrar

            </button>
            <div *ngIf="mensagemErro" class="alert alert-danger mt-3 text-center p-2 small" role="alert">
                {{ mensagemErro }}
            </div>

        </form>

    </div>

</div>
